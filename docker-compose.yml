services:
  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5-mini}
      SAARTHI_ALLOWED_ORIGINS: ${SAARTHI_ALLOWED_ORIGINS:-}
      VOICE_SERVICE_URL: http://voice:8010
      VOICE_SERVICE_AUTH_TOKEN: ${VOICE_SERVICE_AUTH_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - voice

  voice:
    build:
      context: .
      dockerfile: services/voice/Dockerfile
    environment:
      CUDA_VISIBLE_DEVICES: ""
      PARAKEET_MODEL: ${PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v2}
      PIPER_BIN: ${PIPER_BIN:-piper}
      PIPER_MODEL_PATH: /app/services/voice/models/en_US-lessac-medium.onnx
      PIPER_CONFIG_PATH: /app/services/voice/models/en_US-lessac-medium.onnx.json
      VOICE_SERVICE_AUTH_TOKEN: ${VOICE_SERVICE_AUTH_TOKEN:-}
      ASR_CONCURRENCY: ${ASR_CONCURRENCY:-1}
      SAARTHI_CPU_THREADS: ${SAARTHI_CPU_THREADS:-4}
    ports:
      - "8010:8010"
    volumes:
      - ./services/voice/models:/app/services/voice/models
      - hf_cache:/root/.cache/huggingface

volumes:
  node_modules:
  hf_cache:
